<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock, Timer & Stopwatch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Time Management App by Mithun</h1>
        
        <!-- Tab Navigation -->
        <div class="tab-navigation">
            <button class="tab-button active" data-tab="clock">Clock</button>
            <button class="tab-button" data-tab="timer">Timer</button>
            <button class="tab-button" data-tab="stopwatch">Stopwatch</button>
        </div>

        <!-- Tab Content -->
        <div class="tab-content">
            <!-- Clock Tab -->
            <div id="clock" class="tab-pane active">
                <div class="clock-display">
                    <div class="time" id="clock-time">00:00:00</div>
                    <div class="date" id="clock-date">Monday, January 1, 2024</div>
                    <div class="period" id="clock-period">AM</div>
                </div>
                <div class="format-toggle">
                    <label>
                        <input type="checkbox" id="format-toggle" unchecked>
                        <span id="format-label">24-Hour Format</span>
                    </label>
                </div>
            </div>

            <!-- Timer Tab -->
            <div id="timer" class="tab-pane">
                <div class="timer-display">
                    <div class="time" id="timer-time">00:00:00</div>
                </div>
                <div class="timer-input">
                    <input type="number" id="timer-hours" min="0" max="23" placeholder="HH" value="0">
                    <span>:</span>
                    <input type="number" id="timer-minutes" min="0" max="59" placeholder="MM" value="0">
                    <span>:</span>
                    <input type="number" id="timer-seconds" min="0" max="59" placeholder="SS" value="0">
                </div>
                <div class="controls">
                    <button class="btn btn-primary" id="timer-start">Start</button>
                    <button class="btn btn-pause" id="timer-pause">Pause</button>
                    <button class="btn btn-reset" id="timer-reset">Reset</button>
                </div>
            </div>

            <!-- Stopwatch Tab -->
            <div id="stopwatch" class="tab-pane">
                <div class="stopwatch-display">
                    <div class="time" id="stopwatch-time">00:00:00</div>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" id="stopwatch-start">Start</button>
                    <button class="btn btn-pause" id="stopwatch-pause">Pause</button>
                    <button class="btn btn-reset" id="stopwatch-reset">Reset</button>
                </div>
                <div class="laps">
                    <button class="btn btn-secondary" id="stopwatch-lap">Lap</button>
                </div>
                <div class="lap-list" id="lap-list"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
